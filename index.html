<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
    <div class="top">
        <input type="number" id="num1" placeholder="123">

        <select id="operation">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>

        <input type="number" id="num2" placeholder="567">
    </div>

    <button id="calcBtn">ПОДСЧИТАТЬ</button>

    <div class="result" id="result"></div>
</div>

<script src="script.js"></script>
</body>
</html>
